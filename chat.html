<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lanux — NUKRAX Chat</title>
<meta name="description" content="Chat with Lanux — ask about Expert Advisors, setup, risk, contact, or use it as a general assistant."/>
<link rel="icon" href="assets/logo.png" type="image/png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@200;300;400;500;600&display=swap" rel="stylesheet"/>
<style>
@font-face{
  font-family:'NKX Display';
  src:url('assets/fonts/nukrax-display.woff2') format('woff2'),
      url('assets/fonts/nukrax-display.otf') format('opentype');
  font-weight:400; font-style:normal; font-display:swap;
}
:root{
  --black:#030507; --panel:#0A0F13; --line:#1B2328; --line-lit:#2A353C;
  --muted:#8A9BA3; --text:#D3DBDD; --white:#F2F5F5; --accent:#8FB8C4; --accent-dim:#46626B;
  --font-logo:'NKX Display','Outfit',sans-serif; --font-m:'Space Mono',monospace; --font-b:'Outfit',sans-serif;
  --ease:cubic-bezier(0.22,1,0.36,1); --ease-out:cubic-bezier(0.16,1,0.3,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100vh; height:100dvh;}
body{
  background:var(--black); color:var(--text); font-family:var(--font-b); font-weight:300;
  overflow:hidden; -webkit-font-smoothing:antialiased;
}
a{color:inherit;text-decoration:none}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--line-lit);border-radius:2px}

.app{ display:flex; height:100vh; height:100dvh; }

/* ── Sidebar ── */
.sidebar{
  width:270px; flex-shrink:0; background:var(--panel); border-right:1px solid var(--line);
  display:flex; flex-direction:column; transition:transform .3s var(--ease);
}
.sidebar-head{ padding:18px 16px; border-bottom:1px solid var(--line); display:flex; align-items:center; gap:10px; }
.sidebar-close{ display:none; margin-left:auto; width:30px; height:30px; border-radius:50%; background:transparent; border:1px solid var(--line); color:var(--muted); cursor:pointer; align-items:center; justify-content:center; font-size:14px; }
.sidebar-close:hover{ color:var(--white); border-color:var(--line-lit); }
.sidebar-backdrop{ display:none; position:fixed; inset:0; background:rgba(0,0,0,0.55); z-index:99; opacity:0; pointer-events:none; transition:opacity .25s var(--ease); }
.sidebar-backdrop.open{ opacity:1; pointer-events:auto; }
.sidebar-logo-img{ width:26px; height:26px; border-radius:6px; border:1px solid var(--line); overflow:hidden; }
.sidebar-logo-img img{ width:100%; height:100%; object-fit:cover; }
.sidebar-logo-text{ font-family:var(--font-logo); font-size:14px; letter-spacing:.05em; text-transform:uppercase; color:var(--white); }
.new-chat-btn{
  margin:14px 16px 8px; padding:10px 12px; font-size:13px; font-weight:500; color:var(--black);
  background:var(--accent); border:1px solid var(--accent); border-radius:18px; cursor:pointer;
  display:flex; align-items:center; justify-content:center; gap:7px; transition:background .2s;
}
.new-chat-btn:hover{ background:var(--white); }
.history-label{ font-family:var(--font-m); font-size:9.5px; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); padding:14px 16px 6px; }
.history-list{ flex:1; overflow-y:auto; padding:0 10px 10px; display:flex; flex-direction:column; gap:3px; }
.history-item{
  padding:10px 12px; border-radius:14px; cursor:pointer; font-size:12.5px; color:var(--text);
  display:flex; align-items:center; justify-content:space-between; gap:6px;
  transition:background .15s; border:1px solid transparent;
}
.history-item:hover{ background:rgba(143,184,196,0.06); }
.history-item.active{ background:rgba(143,184,196,0.09); border-color:var(--line-lit); color:var(--white); }
.history-item-title{ overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1; }
.history-item-del{ opacity:0; color:var(--muted); font-size:13px; flex-shrink:0; }
.history-item:hover .history-item-del{ opacity:1; }
.history-item-del:hover{ color:var(--white); }
.sidebar-foot{ padding:14px 16px; border-top:1px solid var(--line); }
.sidebar-back{ font-size:12px; color:var(--muted); display:flex; align-items:center; gap:6px; }
.sidebar-back:hover{ color:var(--white); }

/* ── Main ── */
.main{ flex:1; display:flex; flex-direction:column; min-width:0; }
.main-head{
  padding:16px 24px; border-bottom:1px solid var(--line); display:flex; align-items:center; justify-content:space-between;
  background:var(--black);
}
.main-head-left{ display:flex; align-items:center; gap:10px; }
.menu-toggle{ display:none; background:transparent; border:1px solid var(--line); color:var(--muted); width:32px; height:32px; border-radius:50%; cursor:pointer; }
.main-title{ font-size:14px; font-weight:500; color:var(--white); }
.main-mode{ font-family:var(--font-m); font-size:9.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); }
.mode-switch{ position:relative; }
.mode-btn{
  font-size:12.5px; color:var(--text); background:var(--panel); border:1px solid var(--line-lit);
  padding:8px 14px; border-radius:18px; cursor:pointer; display:flex; align-items:center; gap:8px;
}
.mode-btn:hover{ border-color:var(--accent); }
.mode-menu{
  position:absolute; top:100%; right:0; margin-top:6px; background:var(--panel); border:1px solid var(--line-lit);
  border-radius:16px; min-width:220px; opacity:0; transform:translateY(6px); pointer-events:none;
  transition:opacity .2s, transform .2s; z-index:20; overflow:hidden;
}
.mode-menu.open{ opacity:1; transform:translateY(0); pointer-events:auto; }
.mode-item{ padding:11px 13px; font-size:12.5px; cursor:pointer; border-bottom:1px solid var(--line); }
.mode-item:last-child{ border-bottom:none; }
.mode-item:hover{ background:rgba(143,184,196,0.07); }
.mode-item.active{ color:var(--accent); }
.mode-item-desc{ font-size:11px; color:var(--muted); margin-top:2px; }

.chat-scroll{ flex:1; overflow-y:auto; padding:26px 0 10px; position:relative; }
.chat-inner{ max-width:720px; margin:0 auto; padding:0 24px; display:flex; flex-direction:column; gap:20px; }

.msg{ max-width:80%; font-size:14.5px; line-height:1.65; animation:msgIn .32s var(--ease-out) both; }
@keyframes msgIn{ from{ opacity:0; transform:translateY(10px) scale(.98); } to{ opacity:1; transform:translateY(0) scale(1); } }
.msg-user{ align-self:flex-end; background:var(--accent); padding:12px 17px; border-radius:20px 20px 4px 20px; color:var(--black); font-weight:500; }
.msg-ai{ align-self:flex-start; }
.msg-ai-label{ font-family:var(--font-m); font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:var(--accent); margin-bottom:6px; display:block; }
.chat-inner{ display:flex; }
.msg-row{ display:flex; }
.msg-row.user{ justify-content:flex-end; }

.empty-state{ max-width:640px; margin:8vh auto 0; padding:0 24px; display:flex; flex-direction:column; gap:18px; align-items:flex-start; }
.empty-title{ font-size:24px; font-weight:400; color:var(--white); font-family:var(--font-b); }
.empty-sub{ font-size:14px; color:var(--muted); max-width:480px; }
.chip-row{ display:flex; flex-wrap:wrap; gap:9px; }
.chip{ font-size:13px; color:var(--text); background:var(--panel); border:1px solid var(--line); padding:9px 16px; border-radius:22px; cursor:pointer; transition:border-color .2s,color .2s; }
.chip:hover{ border-color:var(--accent); color:var(--white); }

.typing{ display:flex; align-items:center; gap:5px; padding:11px 15px; background:rgba(143,184,196,0.06); border:1px solid rgba(143,184,196,0.14); border-radius:16px 16px 16px 4px; animation:msgIn .28s var(--ease-out) both; }
.typing span{ width:6px; height:6px; border-radius:50%; background:var(--accent); animation:bounce 1s ease-in-out infinite; }
.typing span:nth-child(2){ animation-delay:.16s; } .typing span:nth-child(3){ animation-delay:.32s; }
@keyframes bounce{ 0%,60%,100%{ transform:translateY(0) scale(1); opacity:.5; } 30%{ transform:translateY(-5px) scale(1.15); opacity:1; } }

/* ── Input ── */
.input-area{ border-top:1px solid var(--line); background:var(--black); padding:16px 24px 20px; }
.input-inner{ max-width:720px; margin:0 auto; }
.input-box{ display:flex; align-items:center; gap:10px; background:var(--panel); border:1px solid var(--line); border-radius:28px; padding:8px 8px 8px 20px; transition:border-color .2s; }
.input-box:focus-within{ border-color:var(--accent); }
.chat-textarea{ flex:1; resize:none; background:transparent; border:none; color:var(--white); font-family:var(--font-b); font-size:14px; outline:none; max-height:160px; line-height:1.5; }
.chat-textarea::placeholder{ color:var(--muted); }
.send-btn{ width:38px; height:38px; flex-shrink:0; border-radius:50%; background:var(--accent); border:none; color:var(--black); cursor:pointer; position:relative; display:flex; align-items:center; justify-content:center; transition:background .2s, transform .15s; }
.send-btn:active{ transform:scale(.88); }
.send-btn svg{ transition:opacity .15s, transform .15s; }
.send-btn.loading svg{ opacity:0; transform:scale(.6); }
.send-btn .btn-spinner{ position:absolute; inset:0; border-radius:50%; opacity:0; pointer-events:none; border:2px solid rgba(3,5,7,0.25); border-top-color:var(--black); }
.send-btn.loading .btn-spinner{ opacity:1; animation:spin .7s linear infinite; }
@keyframes spin{ to{ transform:rotate(360deg); } }
.send-btn:hover{ background:var(--white); }
.send-btn:disabled{ opacity:.4; cursor:default; }
.input-hint{ font-size:11px; color:var(--muted); margin-top:8px; text-align:center; font-family:var(--font-m); letter-spacing:.02em; }

/* ── Tutorial overlay ── */
.tutorial-overlay{
  position:fixed; inset:0; background:rgba(3,5,7,0.88); backdrop-filter:blur(4px); z-index:200;
  display:flex; align-items:center; justify-content:center; padding:20px;
}
.tut-card{
  width:100%; max-width:420px; background:var(--panel); border:1px solid var(--line-lit); border-radius:22px;
  padding:28px 26px; display:flex; flex-direction:column; gap:20px;
}
.tut-icon{ width:52px; height:52px; border-radius:18px; border:1px solid var(--line-lit); background:var(--black); display:flex; align-items:center; justify-content:center; font-size:21px; color:var(--accent); }
.tut-step-body{ display:flex; flex-direction:column; gap:12px; animation:stepIn .4s var(--ease-out); }
@keyframes stepIn{ from{ opacity:0; transform:translateY(10px);} to{ opacity:1; transform:translateY(0);} }
.tut-title{ font-size:19px; font-weight:500; color:var(--white); }
.tut-body{ font-size:14px; line-height:1.6; color:var(--muted); }
.tut-dots{ display:flex; gap:6px; }
.tut-dot{ width:18px; height:3px; border-radius:2px; background:var(--line); transition:background .3s,width .3s; }
.tut-dot.active{ background:var(--accent); width:30px; }
.tut-dot.done{ background:var(--accent-dim); }
.tut-actions{ display:flex; align-items:center; justify-content:space-between; }
.tut-skip{ font-size:12.5px; color:var(--muted); cursor:pointer; }
.tut-skip:hover{ color:var(--text); }
.tut-continue{ font-size:13.5px; font-weight:600; color:var(--black); background:var(--accent); border:none; padding:11px 22px; border-radius:20px; cursor:pointer; transition:background .2s; }
.tut-continue:hover{ background:var(--white); }

/* ── Mobile ── */
@media(max-width:820px){
  .sidebar{ position:fixed; left:0; top:0; bottom:0; z-index:100; transform:translateX(-100%); box-shadow:0 0 40px rgba(0,0,0,.5); }
  .sidebar.open{ transform:translateX(0); }
  .sidebar-close{ display:flex; }
  .sidebar-backdrop{ display:block; }
  .menu-toggle{ display:flex; align-items:center; justify-content:center; }
  .main-title{ font-size:13px; }
  .msg{ max-width:92%; }
  .empty-title{ font-size:20px; }
}
</style>
</head>
<body>
<div class="app">
  <div class="sidebar-backdrop" data-backdrop></div>
  <aside class="sidebar" data-sidebar>
    <div class="sidebar-head">
      <div class="sidebar-logo-img"><img src="assets/logo.png" alt="" onerror="this.parentElement.style.display='none'"/></div>
      <div class="sidebar-logo-text">Lanux</div>
      <button class="sidebar-close" data-sidebar-close type="button" aria-label="Close menu">✕</button>
    </div>
    <button class="new-chat-btn" data-new-chat type="button">+ New chat</button>
    <div class="history-label">History</div>
    <div class="history-list" data-history-list></div>
    <div class="sidebar-foot">
      <a href="index.html" class="sidebar-back">← Back to nukrax.sh</a>
    </div>
  </aside>

  <main class="main">
    <div class="main-head">
      <div class="main-head-left">
        <button class="menu-toggle" data-menu-toggle type="button" aria-label="Toggle history">☰</button>
        <div>
          <div class="main-title">Lanux</div>
        </div>
      </div>
      <div class="mode-switch">
        <button class="mode-btn" data-mode-btn type="button">
          <span data-mode-btn-label>Nukrax Assistant</span> <span>⋮</span>
        </button>
        <div class="mode-menu" data-mode-menu>
          <div class="mode-item" data-mode-choice="nukrax">
            <div>Nukrax Assistant</div>
            <div class="mode-item-desc">Site, EAs, setup, contact — anything NUKRAX</div>
          </div>
          <div class="mode-item" data-mode-choice="general">
            <div>General AI</div>
            <div class="mode-item-desc">A normal AI assistant, any topic</div>
          </div>
        </div>
      </div>
    </div>

    <div class="chat-scroll" data-scroll>
      <div class="chat-inner" data-chat-inner style="flex-direction:column;"></div>
    </div>

    <div class="input-area">
      <div class="input-inner">
        <div class="input-box">
          <textarea class="chat-textarea" rows="1" placeholder="Ask anything…" data-input></textarea>
          <button class="send-btn" data-send type="button" aria-label="Send">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4 20-7z"/></svg>
            <span class="btn-spinner"></span>
          </button>
        </div>
        <div class="input-hint">Lanux can make mistakes. Verify important details on Telegram.</div>
      </div>
    </div>
  </main>
</div>

<script type="module">
import { QUICK_PROMPTS, TUTORIAL_STEPS } from './assets/ai/ai-data.js';
import { getNukraxResponse } from './assets/ai/responder.js';
import * as History from './assets/ai/history.js';

const sidebar = document.querySelector('[data-sidebar]');
const historyList = document.querySelector('[data-history-list]');
const chatInner = document.querySelector('[data-chat-inner]');
const scrollEl = document.querySelector('[data-scroll]');
const input = document.querySelector('[data-input]');
const sendBtn = document.querySelector('[data-send]');
const modeBtn = document.querySelector('[data-mode-btn]');
const modeBtnLabel = document.querySelector('[data-mode-btn-label]');
const modeMenu = document.querySelector('[data-mode-menu]');
const menuToggle = document.querySelector('[data-menu-toggle]');
const backdrop = document.querySelector('[data-backdrop]');
const sidebarClose = document.querySelector('[data-sidebar-close]');
const newChatBtn = document.querySelector('[data-new-chat]');

let convo = History.getOrCreateActiveConversation(History.getMode());

menuToggle.addEventListener('click', () => {
  sidebar.classList.toggle('open');
  backdrop.classList.toggle('open');
});
sidebarClose.addEventListener('click', closeSidebar);
backdrop.addEventListener('click', closeSidebar);
function closeSidebar() {
  sidebar.classList.remove('open');
  backdrop.classList.remove('open');
}

function refreshModeUI() {
  const mode = History.getMode();
  const label = mode === 'nukrax' ? 'Nukrax Assistant' : 'General AI';
  modeBtnLabel.textContent = label;
  modeMenu.querySelectorAll('[data-mode-choice]').forEach(el => {
    el.classList.toggle('active', el.dataset.modeChoice === mode);
  });
}
modeBtn.addEventListener('click', (e) => { e.stopPropagation(); modeMenu.classList.toggle('open'); });
document.addEventListener('click', () => modeMenu.classList.remove('open'));
modeMenu.querySelectorAll('[data-mode-choice]').forEach(el => {
  el.addEventListener('click', () => {
    const newMode = el.dataset.modeChoice;
    if (newMode !== History.getMode()) {
      History.setMode(newMode);
      if (convo.messages.length > 0) convo = History.createConversation(newMode);
      else convo.mode = newMode;
    }
    refreshModeUI();
    modeMenu.classList.remove('open');
    renderAll();
  });
});

function renderHistory() {
  const all = History.getAllConversations();
  historyList.innerHTML = '';
  all.forEach(c => {
    const item = document.createElement('div');
    item.className = 'history-item' + (c.id === convo.id ? ' active' : '');
    item.innerHTML = `<span class="history-item-title">${escapeHtml(c.title)}</span><span class="history-item-del" data-del="${c.id}">✕</span>`;
    item.addEventListener('click', (e) => {
      if (e.target.closest('[data-del]')) return;
      History.setActiveConversationId(c.id);
      convo = History.getConversation(c.id);
      closeSidebar();
      renderAll();
    });
    historyList.appendChild(item);
  });
  historyList.querySelectorAll('[data-del]').forEach(delBtn => {
    delBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      const id = delBtn.dataset.del;
      History.deleteConversation(id);
      if (id === convo.id) convo = History.getOrCreateActiveConversation(History.getMode());
      renderAll();
    });
  });
}

function escapeHtml(s) {
  const d = document.createElement('div'); d.textContent = s; return d.innerHTML;
}

function renderMessages() {
  chatInner.innerHTML = '';
  if (!convo.messages.length) {
    const mode = History.getMode();
    const prompts = QUICK_PROMPTS[mode === 'nukrax' ? 'nukrax' : 'general'];
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.innerHTML = `
      <div class="empty-title">Ask me anything${mode === 'nukrax' ? ' about NUKRAX' : ''}.</div>
      <div class="empty-sub">${mode === 'nukrax' ? 'Expert Advisors, setup, risk management, contact — I have the details.' : 'General assistant mode is on \u2014 ask about anything you like.'}</div>
      <div class="chip-row">${prompts.map(p => `<div class="chip" data-prompt="${escapeHtml(p)}">${p}</div>`).join('')}</div>
    `;
    empty.querySelectorAll('[data-prompt]').forEach(chip => {
      chip.addEventListener('click', () => { input.value = chip.dataset.prompt; sendMessage(); });
    });
    chatInner.appendChild(empty);
    return;
  }
  convo.messages.forEach(m => chatInner.appendChild(renderMsgRow(m)));
  scrollEl.scrollTop = scrollEl.scrollHeight;
}

function renderMsgRow(m) {
  const row = document.createElement('div');
  row.className = 'msg-row' + (m.role === 'user' ? ' user' : '');
  const msg = document.createElement('div');
  if (m.role === 'user') {
    msg.className = 'msg msg-user';
    msg.textContent = m.content;
  } else {
    msg.className = 'msg msg-ai';
    msg.innerHTML = `<span class="msg-ai-label">LANUX</span>`;
    const p = document.createElement('div');
    p.textContent = m.content;
    msg.appendChild(p);
  }
  row.appendChild(msg);
  return row;
}

function appendUserRow(text) {
  const empty = chatInner.querySelector('.empty-state');
  if (empty) empty.remove();
  const row = document.createElement('div');
  row.className = 'msg-row user';
  const msg = document.createElement('div');
  msg.className = 'msg msg-user';
  msg.textContent = text;
  row.appendChild(msg);
  chatInner.appendChild(row);
  scrollEl.scrollTop = scrollEl.scrollHeight;
}

function appendAssistantRow() {
  const row = document.createElement('div');
  row.className = 'msg-row';
  const msg = document.createElement('div');
  msg.className = 'msg msg-ai';
  msg.innerHTML = `<span class="msg-ai-label">LANUX</span>`;
  const p = document.createElement('div');
  msg.appendChild(p);
  row.appendChild(msg);
  chatInner.appendChild(row);
  return p;
}

// Letter-by-letter reveal, duration scales with length but is capped.
function typeWriter(el, text) {
  return new Promise(resolve => {
    const duration = Math.min(1800, Math.max(280, text.length * 13));
    const start = performance.now();
    function frame(now) {
      const progress = Math.min(1, (now - start) / duration);
      const chars = Math.max(1, Math.floor(progress * text.length));
      el.textContent = text.slice(0, chars);
      scrollEl.scrollTop = scrollEl.scrollHeight;
      if (progress < 1) requestAnimationFrame(frame);
      else { el.textContent = text; resolve(); }
    }
    requestAnimationFrame(frame);
  });
}

function renderAll() { refreshModeUI(); renderHistory(); renderMessages(); }

function autoGrow() { input.style.height = 'auto'; input.style.height = Math.min(input.scrollHeight, 160) + 'px'; }
input.addEventListener('input', autoGrow);
input.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
sendBtn.addEventListener('click', sendMessage);

async function sendMessage() {
  const text = input.value.trim();
  if (!text) return;
  input.value = ''; autoGrow();
  convo = History.addMessage(convo.id, 'user', text);
  appendUserRow(text);

  const typingRow = document.createElement('div');
  typingRow.className = 'msg-row';
  typingRow.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
  chatInner.appendChild(typingRow);
  scrollEl.scrollTop = scrollEl.scrollHeight;
  sendBtn.disabled = true;
  sendBtn.classList.add('loading');

  const mode = History.getMode();
  let reply;

  if (mode === 'nukrax') {
    // Fully local — no network call, no daily limit, works on any host.
    const delay = 280 + Math.random() * 220;
    await new Promise(r => setTimeout(r, delay));
    reply = getNukraxResponse(text);
  } else {
    // General AI: try the live model; gracefully fall back to the local
    // engine if the backend isn't reachable.
    try {
      const hist = convo.messages.slice(-16).map(m => ({ role: m.role, content: m.content }));
      const res = await fetch('api/chat', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ mode, messages: hist })
      });
      const data = await res.json();
      reply = data.reply || getNukraxResponse(text);
    } catch (err) {
      reply = getNukraxResponse(text);
    }
  }

  typingRow.remove();
  convo = History.addMessage(convo.id, 'assistant', reply);
  const textEl = appendAssistantRow();
  sendBtn.disabled = false;
  sendBtn.classList.remove('loading');
  await typeWriter(textEl, reply);
}

newChatBtn.addEventListener('click', () => {
  convo = History.createConversation(History.getMode());
  closeSidebar();
  renderAll();
});

// ── Tutorial (shown once, site-wide flag shared with the widget) ──
function runTutorial() {
  let step = 0;
  const overlay = document.createElement('div');
  overlay.className = 'tutorial-overlay';
  document.body.appendChild(overlay);

  function draw() {
    const s = TUTORIAL_STEPS[step];
    const isLast = step === TUTORIAL_STEPS.length - 1;
    overlay.innerHTML = `
      <div class="tut-card">
        <div class="tut-step-body" key="${step}">
          <div class="tut-icon">${s.icon}</div>
          <div class="tut-title">${s.title}</div>
          <div class="tut-body">${s.body}</div>
        </div>
        <div class="tut-dots">${TUTORIAL_STEPS.map((_, i) => `<div class="tut-dot ${i === step ? 'active' : i < step ? 'done' : ''}"></div>`).join('')}</div>
        <div class="tut-actions">
          <span class="tut-skip" data-skip>Skip tour</span>
          <button class="tut-continue" data-continue type="button">${isLast ? "Let's chat" : 'Continue'}</button>
        </div>
      </div>
    `;
    overlay.querySelector('[data-skip]').addEventListener('click', finish);
    overlay.querySelector('[data-continue]').addEventListener('click', () => {
      if (isLast) { finish(); return; }
      step++; draw();
    });
  }
  function finish() {
    History.markTutorialSeen();
    overlay.remove();
  }
  draw();
}

renderAll();
if (!History.hasTutorialBeenSeen()) runTutorial();
</script>
