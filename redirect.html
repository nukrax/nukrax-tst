<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NUKRAX — Initializing Environment</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=Outfit:wght@200;300;400;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
:root{
  --black:#060606;--deep:#0c0c0c;--charcoal:#141414;
  --steel:#2e2e2e;--muted:#5a5a5a;--smoke:#9a9a9a;
  --offwhite:#e6e6e4;--white:#f4f4f2;
  --font-d:'Bebas Neue',sans-serif;
  --font-m:'Space Mono',monospace;
  --font-b:'Outfit',sans-serif;
  --ease:cubic-bezier(0.16,1,0.3,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden}
body{
  background:var(--black);color:var(--offwhite);
  font-family:var(--font-b);cursor:none;
  display:flex;align-items:center;justify-content:center;
}

/* Grain */
body::after{
  content:'';position:fixed;inset:0;z-index:9998;
  pointer-events:none;opacity:0.025;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:180px 180px;animation:grain .5s steps(1) infinite;
}
@keyframes grain{
  0%,100%{transform:translate(0,0)}10%{transform:translate(-2%,-3%)}
  20%{transform:translate(3%,2%)}30%{transform:translate(-1%,4%)}
  40%{transform:translate(4%,-1%)}50%{transform:translate(-3%,3%)}
  60%{transform:translate(2%,-4%)}70%{transform:translate(-4%,2%)}
  80%{transform:translate(3%,1%)}90%{transform:translate(-2%,-2%)}
}

/* Cursor */
#cursor-dot{
  position:fixed;top:0;left:0;width:6px;height:6px;
  background:var(--white);border-radius:50%;pointer-events:none;
  z-index:10000;transform:translate(-50%,-50%);mix-blend-mode:difference;
}

/* Canvas */
#canvas-bg{position:fixed;inset:0;z-index:0;pointer-events:none}

/* LOADER STAGE */
.loader-stage{
  position:relative;z-index:1;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;
  padding:40px;
}

/* 3D spinner container */
.spinner-wrap{
  position:relative;
  width:160px;height:160px;
  margin-bottom:52px;
}

/* SVG rings */
.spinner-svg{
  position:absolute;inset:0;
  animation:rotateSVG 3s linear infinite;
}
.spinner-svg.rev{
  animation-direction:reverse;
  animation-duration:2s;
}
.spinner-svg.slow{animation-duration:5s}
@keyframes rotateSVG{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

.ring-outer{
  fill:none;stroke:rgba(90,90,90,0.4);stroke-width:1;
  stroke-dasharray:240 40;stroke-linecap:round;
}
.ring-mid{
  fill:none;stroke:rgba(154,154,154,0.3);stroke-width:0.8;
  stroke-dasharray:120 60;stroke-linecap:round;
}
.ring-inner{
  fill:none;stroke:rgba(196,196,192,0.5);stroke-width:1.2;
  stroke-dasharray:60 20;stroke-linecap:round;
}

/* Center dot pulse */
.center-pulse{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:10px;height:10px;
  border-radius:50%;
  background:var(--smoke);
  animation:centerPulse 1.5s ease-in-out infinite;
}
.center-pulse::before{
  content:'';position:absolute;inset:-8px;
  border-radius:50%;
  border:1px solid rgba(154,154,154,0.3);
  animation:ringPulse 1.5s ease-in-out infinite;
}
@keyframes centerPulse{
  0%,100%{transform:translate(-50%,-50%) scale(1);opacity:0.8}
  50%{transform:translate(-50%,-50%) scale(1.3);opacity:1}
}
@keyframes ringPulse{
  0%{transform:scale(1);opacity:0.5}
  100%{transform:scale(2.5);opacity:0}
}

/* Corner brackets */
.bracket{
  position:absolute;
  width:20px;height:20px;
  border-color:rgba(90,90,90,0.5);
  border-style:solid;
}
.bracket-tl{top:0;left:0;border-width:1px 0 0 1px;animation:bracketPulse 2s ease-in-out infinite}
.bracket-tr{top:0;right:0;border-width:1px 1px 0 0;animation:bracketPulse 2s ease-in-out infinite .5s}
.bracket-bl{bottom:0;left:0;border-width:0 0 1px 1px;animation:bracketPulse 2s ease-in-out infinite 1s}
.bracket-br{bottom:0;right:0;border-width:0 1px 1px 0;animation:bracketPulse 2s ease-in-out infinite 1.5s}
@keyframes bracketPulse{
  0%,100%{border-color:rgba(90,90,90,0.5)}
  50%{border-color:rgba(154,154,154,0.8)}
}

/* Destination label */
.dest-label{
  font-family:var(--font-m);font-size:10px;
  letter-spacing:0.28em;text-transform:uppercase;
  color:var(--muted);margin-bottom:20px;
  opacity:0;animation:fadeUp .6s var(--ease) .3s forwards;
}
.dest-label span{color:var(--smoke)}

/* Main status */
.status-text{
  font-family:var(--font-d);
  font-size:clamp(20px,4vw,32px);
  letter-spacing:0.18em;
  color:var(--offwhite);
  margin-bottom:16px;
  opacity:0;animation:fadeUp .6s var(--ease) .5s forwards;
}

/* URL display */
.dest-url{
  font-family:var(--font-m);font-size:12px;
  letter-spacing:0.12em;color:var(--muted);
  margin-bottom:40px;
  opacity:0;animation:fadeUp .6s var(--ease) .7s forwards;
}

/* Progress bar */
.progress-wrap{
  width:240px;height:1px;
  background:rgba(46,46,46,0.6);
  position:relative;
  margin-bottom:32px;
  opacity:0;animation:fadeUp .6s var(--ease) .9s forwards;
}
.progress-fill{
  position:absolute;top:0;left:0;height:100%;
  background:linear-gradient(90deg,transparent,var(--smoke),var(--offwhite));
  width:0%;transition:width .1s linear;
}
.progress-glow{
  position:absolute;top:-1px;right:0;
  width:20px;height:3px;
  background:var(--offwhite);
  filter:blur(4px);
  opacity:0.6;
}

/* Log lines */
.log-lines{
  display:flex;flex-direction:column;gap:6px;
  width:300px;text-align:left;
  opacity:0;animation:fadeUp .6s var(--ease) 1.1s forwards;
}
.log-line{
  font-family:var(--font-m);font-size:9px;
  letter-spacing:0.12em;text-transform:uppercase;
  color:var(--steel);
  display:flex;align-items:center;gap:10px;
  opacity:0;transition:opacity .4s,color .4s;
}
.log-line.active{opacity:1;color:var(--muted)}
.log-line.done{opacity:1;color:var(--smoke)}
.log-line-dot{
  width:4px;height:4px;border-radius:50%;
  background:var(--steel);flex-shrink:0;
  transition:background .4s;
}
.log-line.active .log-line-dot{background:var(--muted);animation:blink 1s ease-in-out infinite}
.log-line.done .log-line-dot{background:var(--smoke)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}

/* Back link */
.back-link{
  display:inline-flex;align-items:center;gap:8px;
  margin-top:32px;
  font-family:var(--font-m);font-size:9px;
  letter-spacing:0.18em;text-transform:uppercase;
  color:var(--muted);text-decoration:none;
  transition:color .25s;
  opacity:0;animation:fadeUp .6s var(--ease) 1.3s forwards;
  cursor:none;
}
.back-link:hover{color:var(--smoke)}

/* Page transition */
#page-curtain{
  position:fixed;inset:0;background:var(--black);z-index:9997;
  pointer-events:none;opacity:0;transition:opacity .5s var(--ease);
}
#page-curtain.active{opacity:1;pointer-events:all}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(16px)}
  to{opacity:1;transform:translateY(0)}
}
</style>
</head>
<body>
<div id="page-curtain"></div>
<div id="cursor-dot"></div>
<canvas id="canvas-bg"></canvas>

<div class="loader-stage">
  <!-- Spinner -->
  <div class="spinner-wrap">
    <div class="bracket bracket-tl"></div>
    <div class="bracket bracket-tr"></div>
    <div class="bracket bracket-bl"></div>
    <div class="bracket bracket-br"></div>

    <!-- Outer ring -->
    <svg class="spinner-svg" viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
      <circle class="ring-outer" cx="80" cy="80" r="72"/>
    </svg>
    <!-- Mid ring -->
    <svg class="spinner-svg rev" viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
      <circle class="ring-mid" cx="80" cy="80" r="58"/>
    </svg>
    <!-- Inner ring -->
    <svg class="spinner-svg slow" viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
      <circle class="ring-inner" cx="80" cy="80" r="44"/>
    </svg>

    <div class="center-pulse"></div>
  </div>

  <div class="dest-label">Target: <span id="dest-label">—</span></div>
  <div class="status-text">Initializing NUKRAX Environment</div>
  <div class="dest-url" id="dest-url">—</div>

  <div class="progress-wrap">
    <div class="progress-fill" id="progress-fill">
      <div class="progress-glow"></div>
    </div>
  </div>

  <div class="log-lines" id="log-lines">
    <div class="log-line" data-step="0">
      <div class="log-line-dot"></div>
      <span>Verifying destination endpoint</span>
    </div>
    <div class="log-line" data-step="1">
      <div class="log-line-dot"></div>
      <span>Establishing secure session</span>
    </div>
    <div class="log-line" data-step="2">
      <div class="log-line-dot"></div>
      <span>Loading environment modules</span>
    </div>
    <div class="log-line" data-step="3">
      <div class="log-line-dot"></div>
      <span>Handshake complete — redirecting</span>
    </div>
  </div>

  <a href="index.html" class="back-link" id="back-link">← Return to NUKRAX Hub</a>
</div>

<script>
/* ── Parse destination ── */
const params=new URLSearchParams(window.location.search);
const dest=params.get('dest')||'sh';
const isShell=dest==='sh';

const DEST_MAP={
  tr:{label:'nukrax.tr',url:'nukrax.tr',file:'nukrax-tr.html',desc:'Trading Journal & Reports'}
};
const info=DEST_MAP[dest]||DEST_MAP['tr'];

document.getElementById('dest-label').textContent=info.label;
document.getElementById('dest-url').textContent=info.url+' · '+info.desc;

/* ── Progress sequence ── */
const fill=document.getElementById('progress-fill');
const lines=document.querySelectorAll('.log-line');
const curtain=document.getElementById('page-curtain');

const STEPS=[
  {pct:20,delay:400},
  {pct:50,delay:1000},
  {pct:78,delay:1600},
  {pct:100,delay:2400}
];

let currentStep=0;
function advanceStep(){
  if(currentStep>=lines.length) return;
  // Mark previous done
  if(currentStep>0) lines[currentStep-1].classList.remove('active');
  if(currentStep>0) lines[currentStep-1].classList.add('done');
  // Activate current
  lines[currentStep].classList.add('active');
  const pct=STEPS[currentStep].pct;
  fill.style.width=pct+'%';
  currentStep++;
}

/* Stagger the log line activation */
setTimeout(()=>advanceStep(),600);
setTimeout(()=>advanceStep(),1200);
setTimeout(()=>advanceStep(),1900);
setTimeout(()=>{
  advanceStep();
  lines[lines.length-1].classList.add('done');
  lines[lines.length-1].classList.remove('active');
},1200);

/* Redirect */
setTimeout(()=>{
  curtain.classList.add('active');
  setTimeout(()=>{
    /* Try to open local file first, fallback to external */
    const localFile='./'+info.file;
    sessionStorage.setItem('nukrax_navigate', 'true');
    window.location.href=localFile;
  },300);
},1500);

/* Cursor */
const dot=document.getElementById('cursor-dot');
document.addEventListener('mousemove',e=>{
  dot.style.left=e.clientX+'px';dot.style.top=e.clientY+'px';
});

/* Page out for back link */
document.querySelectorAll('a[href]:not([href^="#"])').forEach(a=>{
  a.addEventListener('click',function(e){
    const href=this.getAttribute('href');
    if(!href||href.startsWith('http')) return;
    e.preventDefault();
    curtain.classList.add('active');
    setTimeout(()=>{window.location.href=href},500);
  });
});

/* Three.js subtle bg */
(function(){
  const canvas=document.getElementById('canvas-bg');
  const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:true});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  renderer.setSize(window.innerWidth,window.innerHeight);
  const scene=new THREE.Scene();
  const camera=new THREE.PerspectiveCamera(60,window.innerWidth/window.innerHeight,0.1,1000);
  camera.position.z=80;

  /* Particles */
  const count=800;
  const pos=new Float32Array(count*3);
  for(let i=0;i<count;i++){
    pos[i*3]=(Math.random()-.5)*300;
    pos[i*3+1]=(Math.random()-.5)*300;
    pos[i*3+2]=(Math.random()-.5)*200;
  }
  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  const mat=new THREE.PointsMaterial({color:0x303030,size:0.5,transparent:true,opacity:0.6});
  scene.add(new THREE.Points(geo,mat));

  /* Concentric torus rings matching the SVG theme */
  const r1=new THREE.Mesh(
    new THREE.TorusGeometry(28,0.1,8,80),
    new THREE.MeshBasicMaterial({color:0x1e1e1e,transparent:true,opacity:0.3})
  );
  const r2=new THREE.Mesh(
    new THREE.TorusGeometry(42,0.08,8,80),
    new THREE.MeshBasicMaterial({color:0x161616,transparent:true,opacity:0.2})
  );
  const r3=new THREE.Mesh(
    new THREE.TorusGeometry(58,0.06,8,80),
    new THREE.MeshBasicMaterial({color:0x121212,transparent:true,opacity:0.15})
  );
  scene.add(r1,r2,r3);

  let t=0;
  function animate(){
    requestAnimationFrame(animate);t+=0.008;
    r1.rotation.x=t*.2;r1.rotation.y=t*.3;
    r2.rotation.x=-t*.15;r2.rotation.z=t*.1;
    r3.rotation.y=t*.12;r3.rotation.z=-t*.08;
    renderer.render(scene,camera);
  }
  animate();
  window.addEventListener('resize',()=>{
    camera.aspect=window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth,window.innerHeight);
  });
})();
</script>
</body>
</html>
